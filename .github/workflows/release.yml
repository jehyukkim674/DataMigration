name: Release

# v* 태그 푸시 또는 수동 실행 시 macOS/Windows 설치본을 빌드해 GitHub Release에 첨부하고,
# 서명된 업데이터 아티팩트(.sig)와 latest.json을 생성한다(자동 업데이트용).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS는 Apple Silicon(arm64) 전용.
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: "release-${{ matrix.platform }}"
          cache-all-crates: "true"

      - name: Cache Tauri bundler tools (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/cache@v4
        with:
          path: ~/AppData/Local/tauri
          key: tauri-tools-${{ runner.os }}

      - name: Install frontend deps
        run: npm ci

      - name: Build app (tauri)
        uses: tauri-apps/tauri-action@v0
        with:
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: "DataMigration ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 자동 업데이트 서명(필수): 업데이터 아티팩트(.sig) + latest.json 생성
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # 참고: Apple 코드서명/공증은 인증서가 없으면 env를 설정하지 않는다(ad-hoc 서명에 맡김).
