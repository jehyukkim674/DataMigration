<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="0.55" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="disk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e7eefc"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" rx="216" fill="url(#bg)"/>

  <!-- 왼쪽 데이터베이스(출처) -->
  <g>
    <path d="M150 360 a120 40 0 0 1 240 0 v300 a120 40 0 0 1 -240 0 z" fill="url(#disk)"/>
    <ellipse cx="270" cy="360" rx="120" ry="40" fill="#ffffff"/>
    <path d="M150 460 a120 40 0 0 0 240 0" fill="none" stroke="#3b82f6" stroke-width="14" stroke-linecap="round" opacity="0.55"/>
    <path d="M150 560 a120 40 0 0 0 240 0" fill="none" stroke="#3b82f6" stroke-width="14" stroke-linecap="round" opacity="0.55"/>
  </g>

  <!-- 오른쪽 데이터베이스(대상) -->
  <g>
    <path d="M634 360 a120 40 0 0 1 240 0 v300 a120 40 0 0 1 -240 0 z" fill="url(#disk)"/>
    <ellipse cx="754" cy="360" rx="120" ry="40" fill="#ffffff"/>
    <path d="M634 460 a120 40 0 0 0 240 0" fill="none" stroke="#06b6d4" stroke-width="14" stroke-linecap="round" opacity="0.55"/>
    <path d="M634 560 a120 40 0 0 0 240 0" fill="none" stroke="#06b6d4" stroke-width="14" stroke-linecap="round" opacity="0.55"/>
  </g>

  <!-- 이동(마이그레이션) 화살표 -->
  <g>
    <path d="M408 486 h150 v-34 l66 58 -66 58 v-34 h-150 z" fill="#facc15" stroke="#1e293b" stroke-width="6" stroke-linejoin="round"/>
  </g>
</svg>
